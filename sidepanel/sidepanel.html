<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UM Survey Auto-Fill</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>UM Survey Auto-Fill</h1>
      <p class="subtitle">Performance Evaluation Tool</p>
    </div>

    <!-- Status Banner -->
    <div id="status-banner" class="status-banner hidden">
      <span id="status-icon"></span>
      <span id="status-text"></span>
    </div>

    <!-- Page Detection -->
    <div id="page-status" class="page-status">
      <span class="dot" id="page-dot"></span>
      <span id="page-status-text">Checking page...</span>
    </div>

    <!-- Rating Selection -->
    <div class="section">
      <label class="section-label">Select Rating</label>
      <div class="rating-grid">
        <button class="rating-btn" data-value="5">
          <span class="rating-number">5</span>
          <span class="rating-label">Excellent</span>
        </button>
        <button class="rating-btn" data-value="4">
          <span class="rating-number">4</span>
          <span class="rating-label">Very Satisfactory</span>
        </button>
        <button class="rating-btn" data-value="3">
          <span class="rating-number">3</span>
          <span class="rating-label">Satisfactory</span>
        </button>
        <button class="rating-btn" data-value="2">
          <span class="rating-number">2</span>
          <span class="rating-label">Below Satisfactory</span>
        </button>
        <button class="rating-btn" data-value="1">
          <span class="rating-number">1</span>
          <span class="rating-label">Needs Improvement</span>
        </button>
      </div>
    </div>

    <!-- Comment Section -->
    <div class="section">
      <div class="toggle-row">
        <label class="section-label" for="comment-toggle">Include Comment</label>
        <label class="switch">
          <input type="checkbox" id="comment-toggle">
          <span class="slider"></span>
        </label>
      </div>
      <div id="comment-section" class="comment-section hidden">
        <textarea id="comment-input" placeholder="Enter your comment for the teacher..." rows="3"></textarea>
      </div>
    </div>

    <!-- Auto-Submit Toggle -->
    <div class="section">
      <div class="toggle-row">
        <label class="section-label" for="submit-toggle">Auto-Submit After Fill</label>
        <label class="switch">
          <input type="checkbox" id="submit-toggle">
          <span class="slider"></span>
        </label>
      </div>
      <p class="hint">When enabled, the form will be submitted automatically after filling.</p>
    </div>

    <!-- Action Buttons -->
    <div class="actions">
      <button id="fill-btn" class="btn btn-primary" disabled>
        <span id="fill-btn-text">Fill Survey</span>
        <span id="fill-btn-loader" class="loader hidden"></span>
      </button>
    </div>

    <!-- Footer -->
    <div class="footer">
      <p>v1.0.0 &middot; Made by <strong>Loftyyyy</strong></p>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
